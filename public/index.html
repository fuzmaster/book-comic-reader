<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#111418" />
  <title>Comic Reader</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Comics" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Library -->
  <div id="library" class="view">
    <header class="topbar">
      <div class="topbar-row">
        <h1>My Library</h1>
        <div class="topbar-actions">
          <button id="add-btn" class="ghost-btn">+ Add</button>
          <button id="select-btn" class="ghost-btn" title="Select multiple">✓</button>
          <button id="stats-btn" class="ghost-btn" title="Reading stats">📊</button>
          <button id="settings-btn" class="ghost-btn" title="Settings">⚙</button>
          <button id="rescan" class="ghost-btn" title="Rescan library">⟳</button>
        </div>
      </div>
      <input id="search" class="search-input" type="search" placeholder="Search titles…" />
      <div class="topbar-bottom">
        <div id="filter-chips" class="chips"></div>
        <select id="sort-select" class="sort-select" title="Sort">
          <option value="default">Default</option>
          <option value="recent">Recently opened</option>
          <option value="az">A → Z</option>
        </select>
      </div>
    </header>
    <div id="shelves"></div>
    <div id="bulk-bar" class="bulk-bar hidden">
      <span id="bulk-count">0 selected</span>
      <div class="bulk-actions">
        <button id="bulk-finished" class="ghost-btn">✓ Finished</button>
        <button id="bulk-unfinished" class="ghost-btn">↺ Unfinished</button>
        <button id="bulk-delete" class="ghost-btn bulk-delete">🗑 Delete</button>
        <button id="bulk-cancel" class="ghost-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Series detail -->
  <div id="series-view" class="view hidden">
    <header class="topbar">
      <div class="topbar-row">
        <button id="series-back" class="ghost-btn">‹ Library</button>
        <h1 id="series-name" style="font-size:20px;margin:0;flex:1;text-align:right;"></h1>
      </div>
    </header>
    <div id="series-grid" class="series-grid"></div>
  </div>

  <!-- Reader -->
  <div id="reader" class="view hidden">
    <div id="stage" class="stage">
      <img id="page" alt="" />
      <div id="spread" class="spread-pair">
        <img id="page-left" class="spread-img" alt="" />
        <img id="page-right" class="spread-img" alt="" />
      </div>
    </div>
    <div id="flip" class="flip hidden">
      <img id="flip-under" class="flip-page" alt="" />
      <div id="flip-leaf" class="flip-leaf">
        <img id="flip-front" class="flip-page" alt="" />
        <div class="flip-shade"></div>
      </div>
    </div>
    <div id="reader-ui" class="reader-ui hidden">
      <div class="reader-top">
        <button id="back" class="ghost-btn">‹ Library</button>
        <span id="reader-title"></span>
        <a id="reader-open" class="ghost-btn hidden" target="_blank" rel="noopener" title="Open original PDF">↗</a>
        <button id="bm-toggle" class="ghost-btn" title="Bookmarks">🔖</button>
        <button id="spread-toggle" class="ghost-btn hidden" title="Two-page spread">📖</button>
        <button id="theme-toggle" class="ghost-btn" title="Day / Dim / Sepia">🌞</button>
        <button id="dir-toggle" class="ghost-btn" title="Reading direction">L→R</button>
        <button id="fit-toggle" class="ghost-btn">Fit: Height</button>
      </div>
      <div class="reader-bottom">
        <input id="slider" type="range" min="0" max="0" value="0" />
        <span id="counter">0 / 0</span>
      </div>
    </div>
    <div id="spinner" class="spinner hidden"></div>
    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- EPUB reader (epub.js) -->
  <div id="epub-view" class="view hidden">
    <div class="doc-top">
      <button id="epub-back" class="ghost-btn">‹ Library</button>
      <span id="epub-title" class="doc-title"></span>
      <button id="bm-toggle-epub" class="ghost-btn" title="Bookmarks">🔖</button>
      <button id="epub-font-dn" class="ghost-btn" title="Smaller text">A−</button>
      <button id="epub-font-up" class="ghost-btn" title="Larger text">A+</button>
    </div>
    <div id="epub-area"></div>
    <button id="epub-prev" class="epub-nav epub-prev">‹</button>
    <button id="epub-next" class="epub-nav epub-next">›</button>
    <div class="doc-bottom">
      <input id="epub-slider" type="range" min="0" max="1000" value="0" />
      <span id="epub-pct">0%</span>
    </div>
  </div>

  <!-- Details / metadata modal -->
  <div id="details" class="modal hidden">
    <div class="modal-card">
      <button id="details-close" class="modal-close" title="Close">×</button>
      <div class="details-body">
        <img id="details-cover" class="details-cover" alt="" />
        <div class="details-info">
          <h2 id="details-title"></h2>
          <div id="details-sub" class="details-sub"></div>
          <div id="details-rating" class="details-rating"></div>
          <p id="details-desc" class="details-desc"></p>
          <div class="details-buttons">
            <button id="details-read" class="primary-btn">Read</button>
            <button id="details-finish" class="ghost-btn">Mark finished</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="settings" class="modal hidden">
    <div class="modal-card">
      <button id="settings-close" class="modal-close" title="Close">×</button>
      <h2 class="stats-title">Settings · Categories</h2>
      <p style="color:var(--muted);font-size:13px;margin:0 0 14px;">Document categories (Comics is built-in). Folder names go under <code>files/</code>.</p>
      <ul id="cats-list" class="cats-list"></ul>
      <button id="cats-add" class="ghost-btn">+ Add category</button>
      <div class="wizard-actions">
        <span id="cats-msg" class="wizard-msg"></span>
        <button id="cats-save" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Reading stats -->
  <div id="stats" class="modal hidden">
    <div class="modal-card">
      <button id="stats-close" class="modal-close" title="Close">×</button>
      <h2 class="stats-title">Reading stats</h2>
      <div id="stats-body" class="stats-body">Loading…</div>
      <div class="stats-actions">
        <button id="export-stats-csv" class="ghost-btn">Stats CSV</button>
        <button id="export-stats-json" class="ghost-btn">Stats JSON</button>
        <button id="export-finished" class="ghost-btn">Finished CSV</button>
      </div>
    </div>
  </div>

  <!-- Bookmarks -->
  <div id="bookmarks" class="modal hidden">
    <div class="modal-card">
      <button id="bookmarks-close" class="modal-close" title="Close">×</button>
      <h2 class="bookmarks-title">Bookmarks</h2>
      <button id="bookmarks-add" class="primary-btn">+ Add this page</button>
      <ul id="bookmarks-list" class="bookmarks-list"></ul>
    </div>
  </div>

  <!-- Add-content wizard -->
  <div id="wizard" class="modal hidden">
    <div class="modal-card">
      <button id="wizard-close" class="modal-close" title="Close">×</button>
      <h2 class="wizard-title">Add to your library</h2>

      <div class="wizard-step">
        <div class="wizard-label">1. Category</div>
        <div id="wizard-cats" class="chips"></div>
      </div>

      <div id="wizard-series-wrap" class="wizard-step hidden">
        <div class="wizard-label">2. Series name</div>
        <input id="wizard-series" class="search-input" list="series-list" placeholder="e.g. Yu-Gi-Oh!" />
        <datalist id="series-list"></datalist>
      </div>

      <div class="wizard-step">
        <div class="wizard-label">Files</div>
        <label id="wizard-drop" class="wizard-drop">
          <input id="wizard-files" type="file" multiple hidden />
          <span id="wizard-drop-text">Tap to choose files, or drop files/folders here</span>
        </label>
        <input id="wizard-folder" type="file" webkitdirectory hidden />
        <div style="margin-top:8px; text-align:center;">
          <button type="button" id="wizard-folder-btn" class="ghost-btn">📁 Choose folder…</button>
        </div>
        <div id="wizard-list" class="wizard-list"></div>
      </div>

      <div class="wizard-progress hidden" id="wizard-progress"><div id="wizard-bar"></div></div>
      <div class="wizard-actions">
        <span id="wizard-msg" class="wizard-msg"></span>
        <button id="wizard-upload" class="primary-btn" disabled>Upload</button>
      </div>
    </div>
  </div>

  <script src="/vendor/jszip/jszip.min.js"></script>
  <script src="/vendor/epubjs/epub.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
